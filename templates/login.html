<!DOCTYPE html>
<html lang="en">

<head>

    <style>
        body {
                background-color: #222227;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        html {
            font-size: 62.5%;
            /* overflow: hidden; */
        }

        h1 {
            font-size: 3.75rem;
        }


        ::-webkit-scrollbar {
            display: none;
        }


        /* CSS */
        .button-86 {
            all: unset;
            width: 100px;
            height: 30px;
            font-size: 16px;
            background: transparent;
            border: none;
            position: relative;
            color: #f0f0f0;
            cursor: pointer;
            z-index: 1;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .button-86::after,
        .button-86::before {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            z-index: -99999;
            transition: all .4s;
        }

        .button-86::before {
            transform: translate(0%, 0%);
            width: 100%;
            height: 100%;
            background: #167e56;
            border-radius: 10px;
        }

        .button-86::after {
            transform: translate(10px, 10px);
            width: 35px;
            height: 35px;
            background: #ffffff15;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 50px;
        }

        .button-86:hover::before {
            transform: translate(5%, 20%);
            width: 110%;
            height: 110%;
        }

        .button-86:hover::after {
            border-radius: 10px;
            transform: translate(0, 0);
            width: 100%;
            height: 100%;
        }

        .button-86:active::after {
            transition: 0s;
            transform: translate(0, 5%);
        }

        .group {
            position: relative;
            margin-bottom: 20px;
            margin-top: 5px;
            margin-left: 10px;
            width: 250px;
            padding: 10px 10px 0px 10px;
            box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
        }

        .textbox {
            font-size: 18px;
            padding: 10px 10px 5px 5px;
            display: block;
            width: 250px;
            border: none;
            border-bottom: 1px solid #757575;
            background-color: #222227;
            color: white;
        }

        .textbox:focus {
            outline: none;
            color: white;
        }

        .group label {
            color: #fff;
            font-size: 18px;
            font-weight: normal;
            position: absolute;
            pointer-events: none;
            left: 5px;
            top: 10px;
            transition: 0.2s ease all;
        }

        .textbox:focus~label,
        .textbox:valid~label {
            top: -10px;
            font-size: 14px;
            color: #fff;
        }

        .bar {
            position: relative;
            display: block;
            width: 250px;
        }

        .bar:before,
        .bar:after {
            content: '';
            height: 2px;
            width: 0;
            bottom: 1px;
            position: absolute;
            background: #5264AE;
            transition: 0.2s ease all;
        }

        .bar:before {
            left: 50%;
        }

        .bar:after {
            right: 50%;
        }

        .textbox:focus~.bar:before,
        .textbox:focus~.bar:after {
            width: 50%;
        }

        .highlight {
            position: absolute;
            height: 60%;
            width: 100px;
            top: 25%;
            left: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        h1 {
            color: #f0f0f0;
        }

        .textbox:focus~.highlight {
            animation: inputHighlighter 0.3s ease;
        }

        @keyframes inputHighlighter {
            from {
                background: #5264AE;
            }

            to {
                width: 0;
                background: transparent;
            }
        }
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up to Calendar</title>
</head>

<body>
    <div style="margin-left: 2rem; margin-top: 5rem;">
        <h1>Sign Up:</h1>
        <br>
        <div class="group">
            <input type="text" class="textbox" name="uname" id="uname" required>
            <span class="highlight"></span>
            <span class="bar"></span>
            <label>Username </label>
        </div>
        <br>
        <div class="group">
            <input type="password" class="textbox" name="password" id="pwd" required>
            <span class="highlight"></span>
            <span class="bar"></span>
            <label>Password</label>
        </div>
        <br>
        <div class="group">
            <input type="password" class="textbox" name="password" id="conf" required>
            <span class="highlight"></span>
            <span class="bar"></span>
            <label>Confirm Password</label>
        </div>
        <br><br>
        <div class="group">
            <select name="ld" class="textbox" id="ld">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
            </select>
            <label> Choose a theme: </label>
        </div>
        <br>
        <br>
        <br>
        <button id="submit" class="button-86" onclick="addUser()">Sign Up</button>
        <br>
        <br>
        <br>
        <h1 id="response"></h1>
        <button id="userpg" style="display: none;" class="button-86" onclick="location.href='/user'">To
            calendar</button>
    </div>
    <script>

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                addUser();
            }
        });

        let nameTaken = false;

        function addUser() {
            if (document.getElementsByTagName('input')[1].value != document.getElementsByTagName('input')[2].value) {
                return alert("Password feilds don't match")
            }
            let newUsername = document.getElementsByTagName('input')[0].value;
            if (newUsername == '') {
                return alert("Please enter a username");
            }

            getUsers(newUsername);

            // timout to ensure the fetch request completes before proceeding
            // this is a workaround for the asynchronous nature of fetch
            setTimeout(() => {

                if (nameTaken) {
                    return alert('Username Taken');
                }

                let data_sent = { "name": newUsername, "pwd": document.getElementsByTagName('input')[1].value, "ld": document.getElementById('ld').value }
                console.log(`${data_sent} ! POST `)
                fetch('/adduser', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data_sent)
                })
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('response').textContent = data.message;
                        document.getElementById('userpg').style.display = 'block';
                    })
                    .catch(error => console.error('Error:', error));

            }, 1000);
        }

        function getUsers(newUsername) {
            return fetch('/adduser', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                },
            })
                .then(response => response.json())
                .then(data => {
                    let users = data.name;
                    nameTaken = false;
                    for (let i = 0; i < users.length; i++) {
                        if (users[i][0] === newUsername) {
                            nameTaken = true;
                            break;
                        }
                    }
                })
                .catch(error => console.error('Error:', error));
        }

    </script>
</body>

</html>
