        /* CSS */
        .button-86 {
            all: unset;
            width: 100px;
            height: 30px;
            font-size: 16px;
            background: transparent;
            border: none;
            position: relative;
            color: #f0f0f0;
            cursor: pointer;
            z-index: 1;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .button-86::after,
        .button-86::before {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            z-index: -99999;
            transition: all .4s;
        }

        .button-86::before {
            transform: translate(0%, 0%);
            width: 100%;
            height: 100%;
            background: #167e56;
            border-radius: 10px;
        }

        .button-86::after {
            transform: translate(10px, 10px);
            width: 35px;
            height: 35px;
            background: #ffffff15;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 50px;
        }

        .button-86:hover::before {
            transform: translate(5%, 20%);
            width: 110%;
            height: 110%;
        }

        .button-86:hover::after {
            border-radius: 10px;
            transform: translate(0, 0);
            width: 100%;
            height: 100%;
        }

        .button-86:active::after {
            transition: 0s;
            transform: translate(0, 5%);
        }

        #navbtm {
            bottom: 0;
            width: 100%;
            height: 250px;
            box-shadow: 0 6rem 9rem rgba(0, 0, 0, 0.5);
            z-index: 2;
            background-color: #222227;
            position: fixed;
        }

        #navbtm span {
            white-space: nowrap;
            /* prevent breaking within a span */
            display: inline-block;
            /* keeps it on one line */
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            /* add "..." if it's too long */
            margin-right: 10px;
            padding: 2px 4px;
        }

        .navhead {
            font-family: 'Quicksand', sans-serif;
            font-size: 50px;
            font-weight: 300;
            color: #eeee;
            margin-top: 1rem;
            /* margin-left: 14 rem; */
            text-align: center;
            text-decoration: underline green;

        }

        .navhead3 {

            padding-left: 50px;

        #container {
            width: 100%;
            height: 100vh;
            background-color: #12121f;
            color: #eeeeee;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #calendar {
            width: 45rem;
            height: 54rem;
            background-color: #222227;
            box-shadow: 0 .5rem 3rem rgba(0, 0, 0, .4);
            margin-left: 37.5%;
            margin-top: 1%;
            border-radius: 3%;
            z-index: -1;
        }

        .month {
            width: 100%;
            height: 12rem;
            background-color: #167e56;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.2rem;
            text-align: center;
            text-shadow: 0 .3rem .5rem rgba(0, 0, 0, 0.5);
        }

        .month i {
            font-size: 2.5rem;
            cursor: pointer;
        }

        .month h1 {
            font-size: 3rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: .2rem;
            margin-bottom: 1rem;
        }

        .month p {
            font-size: 1.6rem;
        }

        .weekdays {
            width: 100%;
            height: 5rem;
            padding: 0 0.4rem;
            display: flex;
            align-items: center;
        }

        .weekdays div {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: .1rem;
            width: calc(44.2rem / 7);
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 0.3rem 0.5rem rgba(0, 0, 0, 0.5);
        }

        .days {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            padding: .2rem;
        }

        .days div {
            font-size: 1.4rem;
            margin: 0.3rem;
            width: calc(40.2rem / 7);
            height: 5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 0.3rem 0.5rem rgba(0, 0, 0, 0.5rem);
            transition: background-color 0.2s;
        }

        .days:hover {
            cursor: pointer;
        }

        .days div:hover:not(.today) {
            background-color: #262626;
            border: .2rem solid #777;
            cursor: pointer;
        }

        .prev-date,
        .next-date {
            opacity: 0.5;
        }

        .today {
            background-color: #167e56;
        }

        .buttons {
            height: 3rem;
            background-color: #12121f00;
            color: #eeeeee;
            text-align: center;
            cursor: pointer;
        }

        .buttons:hover {
            background-color: #777;
            cursor: pointer;
        }

        #input {

            border-radius: 5%;
            margin-top: 50px;
            padding: 35px;
            width: 45rem;
            height: 54rem;

        #txtarea {

            color: #12121f;

            margin-top: -100px;
            margin-left: -467px;

            padding: 5%;
        }

        #close {
            margin-right: 0;
            margin-top: -5%;
        }

        #close:hover {
            cursor: pointer;
        }

        #closeInput:hover {
            cursor: pointer;
        }

        .group {
            position: relative;
            margin-bottom: 20px;
            margin-top: 5px;
            margin-left: 10px;
            width: 250px;
            padding: 10px 10px 0px 10px;
            box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
        }

        .textbox {
            font-size: 18px;
            padding: 10px 10px 5px 5px;
            display: block;
            width: 250px;
            border: none;
            border-bottom: 1px solid #757575;
            background-color: #222227;
            color: white;
        }

        .textbox:focus {
            outline: none;
            color: white;
        }

        .group label {
            color: #fff;
            font-size: 18px;
            font-weight: normal;
            position: absolute;
            pointer-events: none;
            left: 5px;
            top: 10px;
            transition: 0.2s ease all;
        }

        .textbox:focus~label,
        .textbox:valid~label {
            top: -10px;
            font-size: 14px;
            color: #fff;
        }

        .bar {
            position: relative;
            display: block;
            width: 250px;
        }

        .bar:before,
        .bar:after {
            content: '';
            height: 2px;
            width: 0;
            bottom: 1px;
            position: absolute;
            background: #5264AE;
            transition: 0.2s ease all;
        }

        .bar:before {
            left: 50%;
        }

        .bar:after {
            right: 50%;
        }

        .textbox:focus~.bar:before,
        .textbox:focus~.bar:after {
            width: 50%;
        }

        .highlight {
            position: absolute;
            height: 60%;
            width: 100px;
            top: 25%;
            left: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .textbox:focus~.highlight {
            animation: inputHighlighter 0.3s ease;
        }

        @keyframes inputHighlighter {
            from {
                background: #5264AE;
            }

            to {
                width: 0;
                background: transparent;
            }
        }

        #stopSound:hover {
            color: #167e56;
            cursor: pointer;
        }

        const date = new Date();


        const renderCalendar = () => {

            date.setDate(1)

            // console.log(date.getDay())

            const firstDayIndex = date.getDay();

            // Previous Month's Last Date
            const prevLastDate = new Date(date.getFullYear(), date.getMonth(), 0).getDate();

            const monthDays = document.querySelector('.days')

            const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();

            const lastDayIndex = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDay();

            const nextDays = 7 - lastDayIndex - 1;

            const allMonths = [
                "Janurary",
                "February",
                "March",
                "April",
                "May",
                "June",
                "July",
                "August",
                "September",
                "October",
                "November",
                "December"
            ]

            document.querySelector('.date h1').innerHTML = allMonths[date.getMonth()];

            document.querySelector('.date p').innerHTML = date.getFullYear();

            var days = "";

            for (let x = firstDayIndex; x > 0; x--) {
                days += `<div class="prev-date">${prevLastDate - x + 1}</div>`;
            }

            for (let i = 1; i <= lastDay; i++) {
                if (i === new Date().getDate() && date.getMonth() === new Date().getMonth() && date.getFullYear() === new Date().getFullYear()) {
                    days += `<div class="today" id="a1${i}">${i}</div>`;
                } else {
                    days += `<div id="a${i}">${i}</div>`;
                }
                //days += `<div>${i}</div>`;
            }

            for (let j = 1; j <= nextDays; j++) {
                days += `<div class="next-date">${j}</div>`;
            }
            monthDays.innerHTML = days;
            // render calendar
        }

        function showInputForm(method) {
            document.querySelector('#calendar').animate(

                    { width: '0rem', height: '0rem' }
                ],
                {
                    duration: 200,

            )

                ],

                document.querySelector('#calendar').style.display = 'none';
            }, 200);
            setTimeout(() => {
                document.getElementById('feilds').style.visibility = 'visible';
            }, 450);

            if (method == 'DELETE') {
                document.getElementById('save').style.display = 'none';
                document.getElementById('del').style.display = 'block';
            } else if (method == 'POST') {
                document.getElementById('save').style.display = 'block';

            }

            document.getElementById('btns').style.visibility = 'hidden';

        let username;


        function getuser(lostname) {
            return fetch('/adduser', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                },
            })
                .then(response => response.json())
                .then(data => {
                    for (let i = 0; i < data.name.length; i++) {
                        if (data.name[i] == lostname) {
                            let a = data;
                            return [a, i]
                        }
                    }
                    return false
                    // aka there is no user wiht that name in the db
                })
                .catch(error => console.error('Error:', error));
        }

                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                },
            })
                .then(response => response.json())
                .then(data => {
                    for (let i = 0; i < data.name.length; i++) {

                        }

        async function init() {

                return alert("incorrect username or password")
            }
            if (getthemes(document.getElementById('uname').value)) {
                let color = prompt("Enter color theme for calendar (color can be chosen from http://10.0.0.14:5000/colorPicker): ")
                if (color) {
                    document.getElementsByClassName('month')[0].style.backgroundColor = color
                }
            }
            var i = data[1];
            if (actual_pwd.pwd[i] == String(document.getElementById('pwd').value)) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('container').style.display = 'block';
                username = document.getElementById('uname').value;
                let bckcolor = '#12121f';

                    // document.getElementById('go_to_today').style.color = 'black';
                    // document.getElementById('createEvent').style.color = 'black';
                    // document.getElementById('deleteEvent').style.color = 'black';
                }
                document.body.style.backgroundColor = bckcolor;
                document.getElementById('container').style.backgroundColor = bckcolor;
                start_execution();
                return
            }

            return alert("incorrect username or password")

        }

        }

        let sound;

        function bell() {
            var spans = document.getElementById('navbtm').getElementsByTagName('span')
            var playsound = setInterval(() => {
                var d = new Date

                if (spans.length != 0) {
                    if (soundplaying) {
                        return
                    }
                    for (let i = 0; i < spans.length; i++) {
                        var day = spans[i].innerHTML.split(' | ')[1].split('/')[1]
                        var month = spans[i].innerHTML.split(' | ')[1].split('/')[0]
                        var year = spans[i].innerHTML.split(' | ')[1].split('/')[2]
                        var ampm;
                        if (spans[i].innerHTML.split(' | ')[2].split(':')[0] >= 12) {
                            ampm = 'PM';
                        } else {
                            ampm = 'AM';
                        }

                        if ( /*date of event == today date*/ day == d.getDate() && parseInt(month) - 1 == d.getMonth() && year == d.getFullYear() && (parseInt(spans[i].innerHTML.split(' | ')[2].split(':')[0]) - 1) % 12 + 1 == parseInt(d.toLocaleTimeString().split(':')[0]) && spans[i].innerHTML.split(' | ')[2].split(':')[1] == d.toLocaleTimeString().split(':')[1] && ampm == d.toLocaleTimeString().split(':')[2].slice(3, 5)) {

                            sound = setInterval(() => {

                            clearInterval(playsound);
